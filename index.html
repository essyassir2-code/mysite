<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GLORIA RP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0000;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: black;
    border-bottom: 2px solid red;
}

.logo {
    color: red;
    font-weight: bold;
    font-size: 24px;
}

.nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* Hero */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 50px;
    color: red;
}

.btn {
    padding: 15px 40px;
    background: red;
    border-radius: 50px;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 20px red;
}

.btn:hover {
    box-shadow: 0 0 40px red;
}

/* Gallery */
.gallery {
    padding: 40px;
    text-align: center;
}

.images {
    display: flex;
    gap: 20px;
    justify-content: center;
}

.images img {
    width: 250px;
    border-radius: 15px;
    border: 2px solid red;
}

/* VIP Cards */
.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px;
}

.card {
    background: #1a0000;
    padding: 20px;
    border-radius: 20px;
    border: 2px solid red;
    text-align: center;
    width: 200px;
    box-shadow: 0 0 20px red;
}

.card h2 {
    color: red;
}

</style>

</head>

<body>

<div class="navbar">
    <div class="logo">GLORIA RP</div>
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">Server</a>
        <a href="#">Rules</a>
        <a href="#">VIP</a>
        <a href="#">Gallery</a>
    </div>
</div>

<div class="hero">
    <h1>WELCOME TO GLORIA 🔥</h1>
    <p>Where legends are made</p>
    <button class="btn">Become Legend</button>
</div>

<div class="gallery">
    <h2>Gallery</h2>
    <div class="images">
        <img src="https://picsum.photos/300">
        <img src="https://picsum.photos/301">
        <img src="https://picsum.photos/302">
    </div>
</div>

<div class="cards">
    <div class="card">
        <h2>$9.99</h2>
        <p>Basic VIP</p>
        <button class="btn">Buy</button>
    </div>

    <div class="card">
        <h2>$24.99</h2>
        <p>Pro VIP</p>
        <button class="btn">Buy</button>
    </div>

    <div class="card">
        <h2>$49.99</h2>
        <p>Legend VIP</p>
        <button class="btn">Buy</button>
    </div>
</div>

</body>
</html>
